version: '3.8'

services:
  trendradar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trendradar
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=America/Chicago
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - trendradar-net
    depends_on:
      redis:
        condition: service_healthy

  # Optional: Redis for caching trend data
  redis:
    image: redis:7-alpine
    container_name: trendradar-redis
    restart: unless-stopped
    # not exposing redis port externally, only accessible within docker network
    volumes:
      - redis-data:/data
    networks:
      - trendradar-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis-data:
    driver: local

networks:
  trendradar-net:
    driver: bridge
